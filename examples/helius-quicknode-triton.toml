# Standard three-provider setup — Helius, QuickNode, and Triton One
#
# Routes reads to the healthiest provider. Enable broadcast_writes to fan
# out sendTransaction to all three simultaneously.
#
# Usage:
#   export HELIUS_API_KEY=...
#   export QUICKNODE_API_KEY=...
#   export TRITON_API_KEY=...
#   rpc-plane -c examples/helius-quicknode-triton.toml run

[server]
listen         = "127.0.0.1:9400"
metrics_listen = "127.0.0.1:9401"

[routing]
strategy    = "best_score"   # healthiest provider gets reads
max_retries = 2
# broadcast_writes = true    # fan out sendTransaction to all providers

[[providers]]
name   = "helius"
url    = "https://mainnet.helius-rpc.com/?api-key=${HELIUS_API_KEY}"
weight = 1
http3  = true

[[providers]]
name   = "quicknode"
url    = "https://your-endpoint.quiknode.pro/${QUICKNODE_API_KEY}"
weight = 1

[[providers]]
name   = "triton"
url    = "https://your-pool.rpcpool.com/${TRITON_API_KEY}"
weight = 1
http3  = true
