name: Feature request
description: Suggest something for RPC Plane to support
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you running into?
      description: Describe the situation — what are you trying to do and where does the current behaviour fall short?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: Describe the behaviour or config you'd want. Rough ideas are fine.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Workarounds, other tools, manual config — anything you've tried.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Routing / health scoring
        - Provider support
        - Cost tracking
        - Observability / metrics
        - CLI / config
        - WebSocket / subscriptions
        - Performance
        - Documentation
        - Other
    validations:
      required: true
